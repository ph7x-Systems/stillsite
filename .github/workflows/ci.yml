name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  PACKAGES: >-
    packages/cms-core
    packages/cms-validation
    packages/cms-build
    packages/cms-cli

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --group dev
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: Types (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: |
          python -m pip install --group dev
          python -m pip install -e "packages/cms-core[postgres]"
          for pkg in $PACKAGES; do python -m pip install -e "$pkg"; done
      - run: mypy

  test:
    name: Tests (pytest, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: |
          python -m pip install --group dev
          for pkg in $PACKAGES; do python -m pip install -e "$pkg"; done
      - run: pytest

  postgres-conformance:
    name: Backend conformance (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stillsite
          POSTGRES_PASSWORD: ci-only
          POSTGRES_DB: stillsite
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stillsite"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      STILLSITE_POSTGRES_URL: postgresql://stillsite:ci-only@127.0.0.1:5432/stillsite
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: |
          python -m pip install --group dev
          python -m pip install -e "packages/cms-core[postgres]"
          for pkg in packages/cms-validation packages/cms-build packages/cms-cli; do
            python -m pip install -e "$pkg"
          done
      - run: pytest tests/test_storage.py tests/test_factory.py -q

  example-build:
    name: Example build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: |
          for pkg in $PACKAGES; do python -m pip install -e "$pkg"; done
      - name: Seed, validate, build and export the example site
        run: |
          cms seed     -p examples/multilingual-company-site
          cms validate -p examples/multilingual-company-site
          cms build    -p examples/multilingual-company-site
          cms export   -p examples/multilingual-company-site --target swa
          test -f examples/multilingual-company-site/_site/index.html
          test -f examples/multilingual-company-site/_site/pt-pt/index.html
          test -f examples/multilingual-company-site/_site/sitemap.xml
          test -f examples/multilingual-company-site/_site/staticwebapp.config.json
          test -f examples/multilingual-company-site/_site/404.html
          test -f examples/multilingual-company-site/_site/blog/category/field-notes/index.html
      - name: Scaffold a fresh project with cms init and build it
        run: |
          cms init /tmp/init-smoke --name "Init Smoke" --base-url "https://smoke.example"
          cms seed  -p /tmp/init-smoke
          cms build -p /tmp/init-smoke
          test -f /tmp/init-smoke/_site/index.html

  docs-links:
    name: Docs internal links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress "**/*.md"
          fail: true

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install trufflehog
        run: curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
      - name: Scan repository history
        run: trufflehog git file://. --fail --no-update

  # Content validation and example-site build jobs are added in Milestone 2,
  # once cms-validation and cms-build produce runnable CLIs.
