name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  PACKAGES: >-
    packages/cms-core
    packages/cms-validation
    packages/cms-build
    packages/cms-theme-ph7x-reference
    packages/cms-cli
    apps/admin

jobs:
  commit-hygiene:
    name: Commit hygiene
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Commit messages carry no attribution trailers
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          bad=$(git log --format='commit %h%n%B' "$BASE".."$HEAD" \
            | grep -iE 'co-authored-by:.*<noreply@|generated (with|by)' || true)
          if [ -n "$bad" ]; then
            echo "Commit messages must not carry tool-generated attribution (Generated with/by, or co-authors at automation addresses). Human co-authorship trailers are welcome when work is genuinely joint."
            echo "$bad"
            exit 1
          fi

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --group dev
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: Types (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: |
          python -m pip install --group dev
          python -m pip install -e "packages/cms-core[postgres]"
          for pkg in $PACKAGES; do python -m pip install -e "$pkg"; done
      - run: mypy

  test:
    name: Tests (pytest, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: |
          python -m pip install --group dev
          for pkg in $PACKAGES; do python -m pip install -e "$pkg"; done
      - run: pytest

  postgres-conformance:
    name: Backend conformance (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sardine
          POSTGRES_PASSWORD: ci-only
          POSTGRES_DB: sardine
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sardine"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: ci-only
          MYSQL_DATABASE: sardine
          MYSQL_USER: sardine
          MYSQL_PASSWORD: ci-only
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -pci-only --silent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          # Fork PRs receive no secrets; the fallback is a throwaway for
          # the ephemeral CI container only (same class as the ci-only
          # literals above).
          MSSQL_SA_PASSWORD: ${{ secrets.MSSQL_CI_PASSWORD || 'Fork-CI-0nly!Pass' }}
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' -b"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
    env:
      SARDINE_POSTGRES_URL: postgresql://sardine:ci-only@127.0.0.1:5432/sardine
      SARDINE_MYSQL_URL: mysql://sardine:ci-only@127.0.0.1:3306/sardine
      SARDINE_MSSQL_URL: mssql://sa:${{ secrets.MSSQL_CI_PASSWORD || 'Fork-CI-0nly!Pass' }}@127.0.0.1:1433/sardine
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: |
          python -m pip install --group dev
          python -m pip install -e "packages/cms-core[postgres,mysql,mssql]"
          for pkg in packages/cms-validation packages/cms-build packages/cms-cli; do
            python -m pip install -e "$pkg"
          done
      - run: pytest tests/test_storage.py tests/test_factory.py -q

  example-build:
    name: Example build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: |
          for pkg in $PACKAGES; do python -m pip install -e "$pkg"; done
      - name: Seed, validate, build and export the example site
        run: |
          cms seed     -p examples/multilingual-company-site
          cms validate -p examples/multilingual-company-site
          cms build    -p examples/multilingual-company-site
          cms export   -p examples/multilingual-company-site --target swa
          test -f examples/multilingual-company-site/_site/index.html
          test -f examples/multilingual-company-site/_site/pt-pt/index.html
          test -f examples/multilingual-company-site/_site/sitemap.xml
          test -f examples/multilingual-company-site/_site/staticwebapp.config.json
          test -f examples/multilingual-company-site/_site/404.html
          test -f examples/multilingual-company-site/_site/blog/category/missions/index.html
      - name: Scaffold a fresh project with cms init and build it
        run: |
          cms init /tmp/init-smoke --name "Init Smoke" --base-url "https://smoke.example"
          cms seed  -p /tmp/init-smoke
          cms build -p /tmp/init-smoke
          test -f /tmp/init-smoke/_site/index.html

  accessibility:
    name: Accessibility (axe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: |
          for pkg in $PACKAGES; do python -m pip install -e "$pkg"; done
          python -m pip install playwright
          python -m playwright install --with-deps chromium
      - name: Fetch pinned axe-core bundle
        run: |
          curl --fail --silent --show-error --location \
            https://registry.npmjs.org/axe-core/-/axe-core-4.12.1.tgz \
            --output /tmp/axe-core.tgz
          echo "4341a01268b5ecbea826f3c7a7d1d69280a2cab3484c93e1bf4c9554460c6ca0  /tmp/axe-core.tgz" \
            | sha256sum --check --strict
          tar -xzf /tmp/axe-core.tgz package/axe.min.js
      - name: Build the example and run the accessibility gate
        run: |
          cms seed  -p examples/multilingual-company-site
          cms build -p examples/multilingual-company-site
          python scripts/a11y_check.py examples/multilingual-company-site/_site package/axe.min.js
      - name: Run the accessibility gate over an RTL build (ADR-0034)
        run: |
          python scripts/rtl_probe.py /tmp/rtl-site
          python scripts/a11y_check.py /tmp/rtl-site package/axe.min.js / /blog/ /blog/first-post/ /404.html
      - name: Editorial-flow check — the landing-page scenario end to end (#127)
        run: |
          python -m pip install httpx2
          python scripts/editor_flow_check.py
      - name: Run the accessibility gate over the admin (snapshot)
        run: |
          # TestClient's transport: starlette prefers httpx2 (the
          # pydantic-maintained successor) and falls back to httpx.
          python -m pip install httpx2
          python -m cms_admin.demo_export \
            --storage examples/multilingual-company-site/content.sqlite3 \
            --out demo-admin/admin \
            --media-dir examples/multilingual-company-site/media \
            --project-dir examples/multilingual-company-site
          python scripts/a11y_check.py demo-admin package/axe.min.js --scheme both \
            /admin/login/ /admin/ /admin/articles/ \
            /admin/articles/we-choose-the-tin/ \
            /admin/articles/we-choose-the-tin/translations/pt-pt/ \
            /admin/pages/home/ /admin/media/ /admin/publishing/
      - name: W3C markup validation (Nu checker)
        run: |
          python -m pip install html5validator
          # The bundled vnu.jar predates the Speculation Rules API; the
          # current W3C validator accepts type="speculationrules".
          html5validator --root examples/multilingual-company-site/_site \
            --ignore-re 'Bad value .speculationrules. for attribute .type.'

  docs-links:
    name: Docs internal links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: --offline --no-progress "**/*.md"
          fail: true

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Scan repository history
        run: |
          docker run --rm --volume "$PWD:/repo:ro" --workdir /repo \
            ghcr.io/trufflesecurity/trufflehog@sha256:977f8eb3c0172ece02bd41875656ed67b955ed595c472a42f819cc8ce9eec3ff \
            git file:///repo --fail --no-update

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: |
          python -m pip install --group dev
          for pkg in $PACKAGES; do python -m pip install -e "$pkg"; done
      - name: Audit installed dependencies
        run: pip-audit --local --progress-spinner off
      - name: Scan Python security patterns
        run: bandit -q -r apps packages scripts -x '*/static/*,*/assets/*' -ll -ii

