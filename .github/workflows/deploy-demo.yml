name: Deploy demo

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "apps/admin/**"
      - "examples/multilingual-company-site/**"
      - ".github/workflows/deploy-demo.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-demo
  cancel-in-progress: true

jobs:
  build:
    name: Build deployable demo artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip httpx2
      - run: |
          for pkg in packages/cms-core packages/cms-validation packages/cms-build packages/cms-theme-ph7x-reference packages/cms-cli apps/admin; do
            python -m pip install -e "$pkg"
          done
          python -m pip install -e "packages/cms-build[images]"
      - name: Build the demo site (seeded SQLite content)
        run: |
          cms seed     -p examples/multilingual-company-site
          cms validate -p examples/multilingual-company-site
          cms export   -p examples/multilingual-company-site --target swa
      - name: Capture the read-only admin snapshot
        run: |
          python -m cms_admin.demo_export \
            --storage examples/multilingual-company-site/content.sqlite3 \
            --out examples/multilingual-company-site/_site/admin \
            --media-dir examples/multilingual-company-site/media \
            --project-dir examples/multilingual-company-site
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: demo-site
          path: examples/multilingual-company-site/_site/
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: Deploy verified artifact to Azure Static Web Apps
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: demo
      url: https://sardine.ph7x.com
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: demo-site
          path: site
      - name: Deploy
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: site
          skip_app_build: true
