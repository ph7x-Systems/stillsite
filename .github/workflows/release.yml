name: Release

# First PyPI release plan (docs/PLAN.md, ADR-0014): version tags publish all
# six packages via PyPI trusted publishing (OIDC) — no long-lived tokens.
# The six pending publishers must exist on PyPI (repository
# ph7x-Systems/sardine-cms, workflow release.yml, environment pypi).

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: Build the distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - name: Check the tag matches every package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          for toml in packages/*/pyproject.toml apps/admin/pyproject.toml; do
            VERSION=$(grep -m1 '^version = ' "$toml" | cut -d'"' -f2)
            if [ "$VERSION" != "$TAG" ]; then
              echo "::error::$toml is $VERSION but the tag is $TAG"; exit 1
            fi
          done
      - name: Build sdists and wheels
        run: |
          for pkg in packages/cms-core packages/cms-validation packages/cms-build \
                     packages/cms-theme-ph7x-reference packages/cms-cli apps/admin; do
            python -m build --outdir dist "$pkg"
          done
          ls -l dist/
      - uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/

  publish:
    name: Publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
