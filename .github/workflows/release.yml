name: Release

# First PyPI release plan (docs/PLAN.md, ADR-0014): version tags publish all
# six packages via PyPI trusted publishing (OIDC) — no long-lived tokens.
# Each published package has its own PyPI environment and trusted publisher.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: Build the distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - name: Check the tag matches every package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          for toml in packages/*/pyproject.toml apps/admin/pyproject.toml; do
            VERSION=$(grep -m1 '^version = ' "$toml" | cut -d'"' -f2)
            if [ "$VERSION" != "$TAG" ]; then
              echo "::error::$toml is $VERSION but the tag is $TAG"; exit 1
            fi
          done
      - name: Build sdists and wheels
        run: |
          for pkg in packages/cms-core packages/cms-validation packages/cms-build \
                     packages/cms-theme-ph7x-reference packages/cms-cli apps/admin; do
            python -m build --outdir dist "$pkg"
          done
          ls -l dist/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: distributions
          path: dist/

  publish:
    name: Publish ${{ matrix.package }}
    needs: build
    runs-on: ubuntu-latest
    # One environment per package: with identical claims PyPI scopes the
    # OIDC token to a single matching project, so sibling packages would
    # 403. Distinct environments make each project's trusted publisher
    # unambiguous.
    environment: ${{ matrix.env }}
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { package: sardine_cms_core, env: pypi-core }
          - { package: sardine_cms_validation, env: pypi-validation }
          - { package: sardine_cms_build, env: pypi-build }
          - { package: sardine_cms_cli, env: pypi-cli }
          - { package: sardine_cms_admin, env: pypi-admin }
          - { package: sardine_cms_theme_ph7x_reference, env: pypi-theme }
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: distributions
          path: dist/
      - name: Select this package's files
        run: |
          mkdir package-dist
          cp dist/${{ matrix.package }}-* package-dist/
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          packages-dir: package-dist/
          skip-existing: true
