name: Bug report
description: Something does not work as documented
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please search existing
        issues first. For security vulnerabilities, do NOT open an issue —
        follow SECURITY.md instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Clear description of the bug, expected vs. actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
      description: Minimal steps or a snippet. The smaller, the faster the fix.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: e.g. main @ 0bbb25f, Python 3.12, macOS 15
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Tracebacks or logs. Redact anything sensitive.
      render: text
