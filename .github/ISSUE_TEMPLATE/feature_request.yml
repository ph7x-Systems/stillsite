name: Feature request
description: Propose an improvement or new capability
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today? Why does it matter?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: >
        How you imagine it working. If it touches architecture (storage
        backends, theme interface, deployment targets), note that these are
        extensible by design — see docs/PLAN.md "Extensibility contracts".
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
