[project]
name = "sardine-cms-build"
version = "0.1.1"
description = "Deterministic static site generator for Sardine CMS"
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
dependencies = ["sardine-cms-core", "sardine-cms-validation", "jinja2>=3.1", "markdown-it-py>=3.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cms_build"]
