[project]
name = "sardine-cms-validation"
version = "0.2.0"
description = "Configurable content validation rules for Sardine CMS"
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
dependencies = ["sardine-cms-core>=0.2.0,<0.3"]

[project.urls]
Homepage = "https://sardine.ph7x.com"
Repository = "https://github.com/ph7x-Systems/sardine-cms"
Documentation = "https://github.com/ph7x-Systems/sardine-cms/wiki"
Changelog = "https://github.com/ph7x-Systems/sardine-cms/blob/main/CHANGELOG.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cms_validation"]
