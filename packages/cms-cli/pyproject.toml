[project]
name = "sardine-cms-cli"
version = "0.7.0"
description = "Sardine CMS command line: validate, build, export, seed, preview"
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
dependencies = ["sardine-cms-core>=0.7.0,<0.8", "sardine-cms-validation>=0.7.0,<0.8", "sardine-cms-build>=0.7.0,<0.8", "typer>=0.12", "copier>=9.4"]

[project.scripts]
cms = "cms_cli.app:main"

[project.urls]
Homepage = "https://sardine.ph7x.com"
Repository = "https://github.com/ph7x-Systems/sardine-cms"
Documentation = "https://github.com/ph7x-Systems/sardine-cms/wiki"
Changelog = "https://github.com/ph7x-Systems/sardine-cms/blob/main/CHANGELOG.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cms_cli"]
