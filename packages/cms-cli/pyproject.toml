[project]
name = "sardine-cms-cli"
version = "0.2.0"
description = "Sardine CMS command line: validate, build, export, seed, preview"
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
dependencies = ["sardine-cms-core>=0.2.0,<0.3", "sardine-cms-validation>=0.2.0,<0.3", "sardine-cms-build>=0.2.0,<0.3", "typer>=0.12", "copier>=9.4"]

[project.scripts]
cms = "cms_cli.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cms_cli"]
