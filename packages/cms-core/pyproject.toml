[project]
name = "cms-core"
version = "0.1.0"
description = "Content model, versioned schemas and translation states for Ph7x.CMS.Framework"
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
dependencies = ["pydantic>=2.9"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cms_core"]
