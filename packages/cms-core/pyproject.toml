[project]
name = "sardine-cms-core"
version = "0.5.0"
description = "Content model, versioned schemas and translation states for Sardine CMS"
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
dependencies = ["pydantic>=2.9", "defusedxml>=0.7.1"]

[project.optional-dependencies]
postgres = ["psycopg[binary]>=3.2"]
mysql = ["PyMySQL>=1.1"]
mssql = ["pymssql>=2.3"]

[project.urls]
Homepage = "https://sardine.ph7x.com"
Repository = "https://github.com/ph7x-Systems/sardine-cms"
Documentation = "https://github.com/ph7x-Systems/sardine-cms/wiki"
Changelog = "https://github.com/ph7x-Systems/sardine-cms/blob/main/CHANGELOG.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cms_core"]
