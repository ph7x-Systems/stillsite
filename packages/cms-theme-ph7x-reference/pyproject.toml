[project]
name = "sardine-cms-theme-ph7x-reference"
version = "0.6.0"
description = "Sardine CMS reference theme: dark editorial design system with local fonts"
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
authors = [{ name = "pH7x Systems", email = "support@ph7x.com" }]
dependencies = ["sardine-cms-build>=0.6.0,<0.7"]

[project.entry-points."sardine.themes"]
ph7x-reference = "cms_theme_ph7x_reference:ReferenceTheme"

[project.urls]
Homepage = "https://sardine.ph7x.com"
Repository = "https://github.com/ph7x-Systems/sardine-cms"
Documentation = "https://github.com/ph7x-Systems/sardine-cms/wiki"
Changelog = "https://github.com/ph7x-Systems/sardine-cms/blob/main/CHANGELOG.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cms_theme_ph7x_reference"]
