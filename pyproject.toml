# Workspace root — tooling configuration and dev dependencies.
# The installable packages live under packages/*; this root is not a package.

[dependency-groups]
dev = [
    "ruff>=0.8",
    "mypy>=1.13",
    "pytest>=8.3",
    "httpx>=0.27",  # fastapi.testclient transport
    "types-PyMySQL>=1.1",  # stubs for the mysql backend
]

[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [".venv"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "C4",  # flake8-comprehensions
    "RUF", # ruff-specific
]

[tool.mypy]
python_version = "3.12"
strict = true
files = ["apps", "packages", "tests"]
exclude = ["build", "dist"]
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
# pymssql ships no type stubs; the backend guards the import and types its
# own surface, so the missing stub is acceptable.
module = "pymssql"
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests", "packages", "apps"]
addopts = "-q --strict-markers"
